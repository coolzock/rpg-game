<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scene Adventure Prototype</title>
<style>
  :root {
    --panel: rgba(17, 24, 39, 0.88);
    --grass1: #2f9e44;
    --grass2: #237a35;
    --text: #f9fafb;
    --player: #60a5fa;
    --skin: #fcd34d;
    --enemy: #dc2626;
    --good: #22c55e;
    --bad: #ef4444;
    --gold: #f59e0b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #0f172a, #111827 55%, #0b1220);
    display: grid;
    place-items: center;
    padding: 16px;
  }

  .game {
    width: min(1000px, 100%);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .hud {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
  }

  .stat, .scene-name {
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scene-name {
    color: #cbd5e1;
    font-size: 14px;
  }

  .badge {
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    font-size: 12px;
  }

  .viewport {
    position: relative;
    height: 440px;
    overflow: hidden;
    background: #3b82f6;
  }

  .sky {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 18%, rgba(255,255,255,0.9) 0 14px, transparent 15px),
      radial-gradient(circle at 18% 20%, rgba(255,255,255,0.85) 0 20px, transparent 21px),
      radial-gradient(circle at 72% 16%, rgba(255,255,255,0.85) 0 16px, transparent 17px),
      linear-gradient(180deg, #60a5fa, #3b82f6 70%);
  }

  .grass {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.12), transparent 25%),
      linear-gradient(90deg, var(--grass1) 0 50%, var(--grass2) 50% 100%);
    background-size: 100% 100%, 80px 80px;
    top: 220px;
  }

  .path {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 56px;
    height: 34px;
    background: linear-gradient(90deg, #b45309, #d97706, #b45309);
    opacity: 0.6;
  }

  .marker {
    position: absolute;
    left: 50%;
    top: 18px;
    transform: translateX(-50%);
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.75);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e2e8f0;
    font-size: 14px;
    z-index: 3;
  }

  .player-wrap {
    position: absolute;
    left: 120px;
    bottom: 68px;
    width: 76px;
    height: 96px;
    transition: left 0.45s ease, bottom 0.45s ease, transform 0.25s ease;
    z-index: 4;
  }

  .player {
    position: absolute;
    inset: 0;
    transform-origin: center bottom;
  }

  .head {
    position: absolute;
    left: 24px;
    top: 4px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fde68a 0 35%, var(--skin) 36% 100%);
    border: 3px solid rgba(0,0,0,0.18);
    z-index: 3;
  }

  .hair {
    position: absolute;
    left: 22px;
    top: 2px;
    width: 32px;
    height: 16px;
    border-radius: 14px 14px 8px 8px;
    background: #92400e;
    z-index: 4;
  }

  .eye {
    position: absolute;
    top: 14px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #111827;
    z-index: 5;
  }

  .eye.left { left: 32px; }
  .eye.right { left: 42px; }

  .body {
    position: absolute;
    left: 18px;
    top: 30px;
    width: 40px;
    height: 34px;
    border-radius: 10px;
    background: linear-gradient(180deg, #93c5fd, var(--player));
    border: 3px solid rgba(0,0,0,0.18);
    z-index: 2;
  }

  .arm {
    position: absolute;
    top: 34px;
    width: 10px;
    height: 26px;
    border-radius: 999px;
    background: var(--skin);
    border: 2px solid rgba(0,0,0,0.12);
  }

  .arm.left {
    left: 10px;
    transform: rotate(20deg);
  }

  .arm.right {
    right: 10px;
    transform: rotate(-20deg);
  }

  .leg {
    position: absolute;
    top: 60px;
    width: 12px;
    height: 28px;
    border-radius: 999px;
    background: #1f2937;
  }

  .leg.left { left: 23px; }
  .leg.right { left: 41px; }

  .foot {
    position: absolute;
    bottom: -4px;
    left: -2px;
    width: 16px;
    height: 8px;
    border-radius: 50%;
    background: #111827;
  }

  .player.walking {
    animation: bob 0.45s infinite alternate ease-in-out;
  }

  @keyframes bob {
    from { transform: translateY(0px) scale(1); }
    to { transform: translateY(-3px) scale(1.01); }
  }

  .chest, .enemy {
    position: absolute;
    display: none;
    align-items: center;
    justify-content: center;
    border: 4px solid rgba(0,0,0,0.25);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  .chest {
    width: 96px;
    height: 76px;
    right: 72px;
    bottom: 84px;
    border-radius: 14px;
    background: linear-gradient(180deg, #fbbf24, #d97706);
    font-size: 38px;
    z-index: 2;
  }

  .enemy {
    width: 92px;
    height: 92px;
    right: 78px;
    bottom: 86px;
    border-radius: 50%;
    background: radial-gradient(circle at 32px 30px, #fecaca 0 10px, var(--enemy) 11px 100%);
    font-size: 36px;
    z-index: 2;
  }

  .battle {
    position: absolute;
    inset: 0;
    display: none;
    z-index: 10;
    background: rgba(2, 6, 23, 0.55);
    backdrop-filter: blur(2px);
  }

  .battle-panel {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(720px, calc(100% - 24px));
    background: rgba(15, 23, 42, 0.96);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }

  .battle-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
  }

  .fighter {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px;
    min-height: 120px;
  }

  .fighter-name {
    font-weight: bold;
    margin-bottom: 8px;
  }

  .bar {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .fill {
    height: 100%;
    width: 100%;
    border-radius: 999px;
    transition: width 0.25s ease;
  }

  .fill.hp { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .fill.enemy { background: linear-gradient(90deg, #fb7185, #dc2626); }

  .battle-vs {
    font-weight: bold;
    color: #cbd5e1;
    text-align: center;
    font-size: 22px;
  }

  .battle-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .battle-actions button {
    flex: 1 1 130px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  button {
    border: 0;
    padding: 12px 16px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(180deg, #2563eb, #1d4ed8);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  }

  button.secondary { background: linear-gradient(180deg, #475569, #334155); }
  button.warning { background: linear-gradient(180deg, #f59e0b, #d97706); }
  button.danger { background: linear-gradient(180deg, #ef4444, #b91c1c); }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .log {
    min-height: 74px;
    padding: 12px 16px 16px;
    color: #e5e7eb;
    line-height: 1.4;
  }

  .tiny {
    color: #cbd5e1;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="game">
    <div class="hud">
      <div class="stat">Gold: <span id="gold">0</span></div>
      <div class="stat">XP: <span id="xp">0</span></div>
      <div class="stat">HP: <span id="playerHpText">30/30</span></div>
      <div class="scene-name">Scene: <span id="sceneName">Grass Field</span> <span class="badge" id="sceneType">safe</span></div>
    </div>

    <div class="viewport">
      <div class="sky"></div>
      <div class="grass"></div>
      <div class="path"></div>
      <div class="marker" id="marker">Click Next Scene to move forward</div>

      <div class="player-wrap" id="playerWrap">
        <div class="player" id="player">
          <div class="hair"></div>
          <div class="head"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="body"></div>
          <div class="arm left"></div>
          <div class="arm right"></div>
          <div class="leg left"><div class="foot"></div></div>
          <div class="leg right"><div class="foot"></div></div>
        </div>
      </div>

      <div class="chest" id="chest">🧰</div>
      <div class="enemy" id="enemy">👾</div>

      <div class="battle" id="battle">
        <div class="battle-panel">
          <div class="battle-top">
            <div class="fighter">
              <div class="fighter-name">Player</div>
              <div class="bar"><div class="fill hp" id="playerHpBar"></div></div>
              <div id="playerBattleText">HP: 30/30</div>
            </div>
            <div class="battle-vs">VS</div>
            <div class="fighter">
              <div class="fighter-name" id="enemyName">Enemy</div>
              <div class="bar"><div class="fill enemy" id="enemyHpBar"></div></div>
              <div id="enemyBattleText">HP: 20/20</div>
            </div>
          </div>
          <div class="battle-actions">
            <button id="attackBtn">Attack</button>
            <button class="secondary" id="runBtn">Run</button>
          </div>
          <div class="tiny" style="margin-top:10px;" id="battleHint">Choose an action.</div>
        </div>
      </div>
    </div>

    <div class="log" id="log">You are standing on grass.</div>

    <div class="controls">
      <button id="nextBtn">Next Scene</button>
      <button class="secondary" id="openChestBtn" disabled>Open Chest</button>
      <button class="warning" id="fightBtn" disabled>Enter Battle</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </div>
  </div>

<script>
  const scenes = [
    { name: 'Grass Field', type: 'safe', event: 'none' },
    { name: 'Forest Edge', type: 'chest', event: 'chest' },
    { name: 'Dark Path', type: 'enemy', event: 'enemy' },
    { name: 'Meadow', type: 'safe', event: 'none' }
  ];

  const el = id => document.getElementById(id);

  const goldEl = el('gold');
  const xpEl = el('xp');
  const playerHpText = el('playerHpText');
  const sceneNameEl = el('sceneName');
  const sceneTypeEl = el('sceneType');
  const logEl = el('log');
  const playerWrap = el('playerWrap');
  const chestEl = el('chest');
  const enemyEl = el('enemy');
  const nextBtn = el('nextBtn');
  const openChestBtn = el('openChestBtn');
  const fightBtn = el('fightBtn');
  const resetBtn = el('resetBtn');
  const markerEl = el('marker');

  const battleEl = el('battle');
  const attackBtn = el('attackBtn');
  const runBtn = el('runBtn');
  const playerHpBar = el('playerHpBar');
  const enemyHpBar = el('enemyHpBar');
  const playerBattleText = el('playerBattleText');
  const enemyBattleText = el('enemyBattleText');
  const enemyNameEl = el('enemyName');
  const battleHint = el('battleHint');

  let sceneIndex = 0;
  let gold = 0;
  let xp = 0;

  let playerMaxHp = 30;
  let playerHp = 30;
  let playerAttack = 6;

  let enemyMaxHp = 0;
  let enemyHp = 0;
  let enemyAttack = 0;
  let enemyActive = false;
  let battleActive = false;
  let chestOpened = false;

  function updatePlayerVisual() {
    const pct = Math.max(0, (playerHp / playerMaxHp) * 100);
    playerHpText.textContent = `${playerHp}/${playerMaxHp}`;
    playerHpBar.style.width = pct + '%';
    playerBattleText.textContent = `HP: ${playerHp}/${playerMaxHp}`;
    if (playerHp <= 10) playerHpBar.style.background = 'linear-gradient(90deg, #f59e0b, #ef4444)';
    else playerHpBar.style.background = 'linear-gradient(90deg, #22c55e, #16a34a)';
  }

  function updateEnemyVisual() {
    const pct = enemyMaxHp > 0 ? Math.max(0, (enemyHp / enemyMaxHp) * 100) : 0;
    enemyHpBar.style.width = pct + '%';
    enemyBattleText.textContent = `HP: ${Math.max(0, enemyHp)}/${enemyMaxHp}`;
  }

  function updateHUD() {
    const scene = scenes[sceneIndex];
    goldEl.textContent = gold;
    xpEl.textContent = xp;
    sceneNameEl.textContent = scene.name;
    sceneTypeEl.textContent = scene.type;
    sceneTypeEl.style.background =
      scene.type === 'enemy' ? 'rgba(239,68,68,0.25)' :
      scene.type === 'chest' ? 'rgba(245,158,11,0.25)' :
      'rgba(34,197,94,0.25)';

    chestEl.style.display = scene.event === 'chest' && !battleActive ? 'flex' : 'none';
    enemyEl.style.display = scene.event === 'enemy' && !battleActive ? 'flex' : 'none';

    openChestBtn.disabled = !(scene.event === 'chest' && !chestOpened && !battleActive);
    fightBtn.disabled = !(scene.event === 'enemy' && !battleActive);

    nextBtn.disabled = battleActive;
    markerEl.textContent = battleActive
      ? 'Battle started!'
      : scene.event === 'none'
        ? 'This scene is calm.'
        : scene.event === 'chest'
          ? 'A treasure chest is here.'
          : 'An enemy appeared here.';

    updatePlayerVisual();
  }

  function movePlayerToScene() {
    playerWrap.classList.add('walking');
    playerWrap.style.left = `${120 + sceneIndex * 150}px`;
    setTimeout(() => playerWrap.classList.remove('walking'), 450);
  }

  function goNextScene() {
    if (battleActive) return;
    sceneIndex = (sceneIndex + 1) % scenes.length;
    chestOpened = false;
    enemyActive = false;
    movePlayerToScene();
    updateHUD();
    const scene = scenes[sceneIndex];
    if (scene.event === 'none') {
      logEl.textContent = `You entered ${scene.name}. Nothing happens yet.`;
    } else if (scene.event === 'chest') {
      logEl.textContent = `You entered ${scene.name}. A chest is waiting.`;
    } else {
      logEl.textContent = `You entered ${scene.name}. An enemy is here.`;
    }
  }

  function openChest() {
    if (chestOpened || battleActive) return;
    chestOpened = true;
    const lootGold = 10 + Math.floor(Math.random() * 16);
    const lootXp = 3 + Math.floor(Math.random() * 8);
    gold += lootGold;
    xp += lootXp;
    logEl.textContent = `You opened the chest and found ${lootGold} gold and ${lootXp} XP!`;
    updateHUD();
  }

  function startBattle() {
    const scene = scenes[sceneIndex];
    if (scene.event !== 'enemy' || battleActive) return;

    battleActive = true;
    enemyActive = true;
    enemyMaxHp = 20 + Math.floor(Math.random() * 10);
    enemyHp = enemyMaxHp;
    enemyAttack = 3 + Math.floor(Math.random() * 4);
    enemyNameEl.textContent = 'Wild Enemy';

    battleEl.style.display = 'block';
    battleHint.textContent = 'Fight started.';
    logEl.textContent = `A battle begins against a wild enemy with ${enemyMaxHp} HP!`;

    updateEnemyVisual();
    updateHUD();
  }

  function endBattle(victory) {
    battleActive = false;
    enemyActive = false;
    battleEl.style.display = 'none';
    chestOpened = false;

    if (victory) {
      const rewardGold = 8 + Math.floor(Math.random() * 12);
      const rewardXp = 5 + Math.floor(Math.random() * 10);
      gold += rewardGold;
      xp += rewardXp;
      logEl.textContent = `You defeated the enemy and earned ${rewardGold} gold and ${rewardXp} XP!`;
      sceneIndex = (sceneIndex + 1) % scenes.length;
      movePlayerToScene();
    } else {
      logEl.textContent = 'You ran away from the battle.';
    }

    updateHUD();
  }

  function enemyTurn() {
    if (enemyHp <= 0 || playerHp <= 0) return;
    const dmg = Math.max(1, enemyAttack + Math.floor(Math.random() * 3) - 1);
    playerHp = Math.max(0, playerHp - dmg);
    updatePlayerVisual();
    battleHint.textContent = `Enemy hits you for ${dmg} damage.`;
    if (playerHp <= 0) {
      setTimeout(() => {
        logEl.textContent = 'You were defeated. Reset to try again.';
        endBattle(false);
        playerHp = playerMaxHp;
        updatePlayerVisual();
      }, 500);
      return;
    }
    updateHUD();
  }

  function attackEnemy() {
    if (!battleActive) return;
    const dmg = playerAttack + Math.floor(Math.random() * 4);
    enemyHp = Math.max(0, enemyHp - dmg);
    updateEnemyVisual();
    battleHint.textContent = `You hit the enemy for ${dmg} damage.`;

    if (enemyHp <= 0) {
      setTimeout(() => endBattle(true), 450);
      return;
    }

    setTimeout(() => enemyTurn(), 450);
  }

  function runFromBattle() {
    if (!battleActive) return;
    endBattle(false);
  }

  function resetGame() {
    sceneIndex = 0;
    gold = 0;
    xp = 0;
    playerMaxHp = 30;
    playerHp = 30;
    playerAttack = 6;
    enemyMaxHp = 0;
    enemyHp = 0;
    enemyAttack = 0;
    battleActive = false;
    enemyActive = false;
    chestOpened = false;

    playerWrap.style.left = '120px';
    battleEl.style.display = 'none';
    logEl.textContent = 'You are standing on grass.';
    updateHUD();
  }

  nextBtn.addEventListener('click', goNextScene);
  openChestBtn.addEventListener('click', openChest);
  fightBtn.addEventListener('click', startBattle);
  attackBtn.addEventListener('click', attackEnemy);
  runBtn.addEventListener('click', runFromBattle);
  resetBtn.addEventListener('click', resetGame);

  updateHUD();
</script>
</body>
</html>
